                data:
                  $ref: '#/definitions/handler.CaptchaResponse'
              type: object
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.APIResponse'
      summary: 获取登录验证码
      tags:
      - auth
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名和密码登录，返回访问令牌和刷新令牌
      parameters:
      - description: 登录信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/handler.LoginResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/handler.APIResponse'
        "401":
          description: 未登录或登录已失效
          schema:
            $ref: '#/definitions/handler.APIResponse'
      summary: 用户登录
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: 将当前访问令牌拉黑，并可选作废刷新令牌
      parameters:
      - description: 可选刷新令牌
        in: body
        name: body
