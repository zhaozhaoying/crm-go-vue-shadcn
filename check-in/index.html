<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <script>
      var path = window.location.pathname || ''
      var assetBase = (path === '/check-in' || path.indexOf('/check-in/') === 0) ? '/check-in/' : '/'
      var coverSupport = 'CSS' in window && typeof CSS.supports === 'function' && (CSS.supports('top: env(a)') ||
        CSS.supports('top: constant(a)'))
      document.write('<link rel="icon" type="image/png" href="' + assetBase + 'static/logo.png" />')
      document.write('<link rel="shortcut icon" href="' + assetBase + 'static/logo.png" />')
      document.write('<link rel="apple-touch-icon" href="' + assetBase + 'static/logo.png" />')
      document.write(
        '<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0' +
        (coverSupport ? ', viewport-fit=cover' : '') + '" />')
    </script>
    <title>打卡</title>
    <!--preload-links-->
    <!--app-context-->
  </head>
  <body>
    <div id="app"><!--app-html--></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
